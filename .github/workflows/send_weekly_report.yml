name: Weekly SEO Report - Email Every Saturday

on:
  schedule:
    - cron: '0 0 * * 6'  # Every Saturday at 8:00 AM Manila time (UTC+8)
  workflow_dispatch:       # Allow manual trigger anytime

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Generate Weekly Excel Report
        run: python generate_report.py

      - name: Send Email with Attachment
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_USER }}
          subject: "Weekly SEO Report - Week of ${{ env.WEEK_LABEL }}"
          body: |
            Hi there!

            Please find attached the weekly SEO report for the week of ${{ env.WEEK_LABEL }}.

            Sheets included: James, Jone, Bernard, Ken, Rosee, Adolf, Kae, Charles, Nicole

            This email was sent automatically every Saturday.
          attachments: weekly_report.xlsx
